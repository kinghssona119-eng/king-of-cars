<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ملك السيارات | إدارة أسطول السيارات</title>
<!-- PWA Meta Tags -->
<meta name="theme-color" content="#0B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ملك السيارات">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="ملك السيارات">
<meta name="msapplication-TileColor" content="#0B1220">
<!-- PWA Icons from logo base64 -->
<link rel="manifest" id="pwaManifest">
<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" id="appleTouchIcon">
<link rel="icon" type="image/png" id="faviconPng">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ===========================================================
   ملك السيارات — هوية بصرية: غرفة تحكم / مركز عمليات ليلي
   =========================================================== */

:root{
  --bg-deep: #0B1220;
  --bg-base: #0F1729;
  --surface: #1A2438;
  --surface-2: #212d45;
  --surface-hover: #263252;
  --border: #2A3650;
  --border-light: #344163;

  --text-primary: #E8EDF7;
  --text-secondary: #94A3B8;
  --text-muted: #5E6B85;

  --accent: #F5A623;
  --accent-dim: #b8801c;
  --accent-glow: rgba(245,166,35,0.18);

  --signal-green: #22C55E;
  --signal-green-dim: rgba(34,197,94,0.15);
  --signal-red: #EF4444;
  --signal-red-dim: rgba(239,68,68,0.15);
  --signal-blue: #3B82F6;
  --signal-blue-dim: rgba(59,130,246,0.15);
  --signal-gray: #64748B;

  --radius: 12px;
  --radius-sm: 8px;
  --shadow-lg: 0 20px 50px -10px rgba(0,0,0,0.5);
  --shadow-md: 0 8px 24px -4px rgba(0,0,0,0.4);

  --font-display: 'Cairo', sans-serif;
  --font-body: 'IBM Plex Sans Arabic', sans-serif;
}

*{ box-sizing: border-box; margin:0; padding:0; }
html, body{
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea{ font-family: inherit; }
input, select, textarea{ color-scheme: dark; }
::selection{ background: var(--accent-glow); }

body{
  background-image:
    radial-gradient(circle at 15% 0%, rgba(245,166,35,0.05), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(59,130,246,0.05), transparent 40%);
  background-attachment: fixed;
}

a{ color: var(--accent); text-decoration:none; }

/* ===================== أزرار ===================== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding: 11px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  background: var(--surface-2);
  color: var(--text-primary);
  font-size: 14.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
}
.btn:hover{ background: var(--surface-hover); border-color: var(--accent-dim); }
.btn:active{ transform: scale(0.97); }
.btn-primary{ background: var(--accent); border-color: var(--accent); color: #1a1206; }
.btn-primary:hover{ background: #ffb53d; border-color:#ffb53d; }
.btn-danger{ background: var(--signal-red); border-color: var(--signal-red); color: #fff; }
.btn-danger:hover{ background: #f25555; }
.btn-ghost{ background: transparent; border-color: var(--border); color: var(--text-secondary); }
.btn-ghost:hover{ background: var(--surface); color: var(--text-primary); }
.btn-sm{ padding: 7px 14px; font-size: 13px; }
.btn-icon{ padding: 9px; width:38px; height:38px; }
.btn-block{ width: 100%; }
.btn:disabled{ opacity:.5; cursor:not-allowed; }

/* ===================== شاشة تسجيل الدخول ===================== */
.login-screen{
  min-height: 100vh;
  display:flex; align-items:center; justify-content:center;
  padding: 20px;
  background:
    radial-gradient(circle at 20% 20%, rgba(245,166,35,0.08), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(59,130,246,0.08), transparent 45%),
    var(--bg-deep);
}
.login-card{
  width: 100%; max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 40px 32px;
  box-shadow: var(--shadow-lg);
}
.login-brand{ text-align:center; margin-bottom: 32px; }
.login-logo{ font-size: 42px; display:block; margin-bottom: 8px; filter: drop-shadow(0 4px 12px var(--accent-glow)); }
.login-brand h1{ font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.login-brand p{ color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
.login-form{ display:flex; flex-direction:column; gap: 18px; }
.field label{ display:block; font-size: 13px; color: var(--text-secondary); margin-bottom: 7px; font-weight:600; }
.field input, .field select, .field textarea{
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14.5px;
  transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.field textarea{ resize: vertical; min-height: 70px; }
.login-error{
  background: var(--signal-red-dim); border: 1px solid rgba(239,68,68,0.3);
  color: #fca5a5; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13.5px;
}
.login-hint{ text-align:center; font-size: 12.5px; color: var(--text-muted); margin-top: 18px; }

/* ===================== التخطيط الرئيسي ===================== */
.app{ display:flex; min-height: 100vh; }

.sidebar{
  width: 232px; flex-shrink:0;
  background: var(--bg-deep);
  border-left: 1px solid var(--border);
  display:flex; flex-direction:column;
  position: sticky; top:0; height: 100vh;
  z-index: 50;
}
.sidebar-brand{ display:flex; align-items:center; gap:10px; padding: 22px 20px 18px; }
.sidebar-logo{ font-size: 24px; }
.sidebar-title{ font-family: var(--font-display); font-weight: 800; font-size: 19px; }
.sidebar-nav{ flex:1; display:flex; flex-direction:column; gap:3px; padding: 8px 12px; overflow-y:auto; }
.nav-item{
  display:flex; align-items:center; gap:12px;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  background: transparent; border:none;
  color: var(--text-secondary);
  font-size: 14.5px; font-weight: 600;
  cursor:pointer; text-align: right;
  transition: all .12s;
  position: relative;
}
.nav-item:hover{ background: var(--surface); color: var(--text-primary); }
.nav-item.active{ background: var(--surface-2); color: var(--accent); }
.nav-item.active::before{
  content:''; position:absolute; right:0; top:8px; bottom:8px; width:3px;
  background: var(--accent); border-radius:3px;
}
.nav-icon{ font-size: 17px; width:20px; text-align:center; }
.nav-badge{
  margin-right:auto; background: var(--signal-red); color:#fff;
  font-size: 11px; font-weight:700; min-width:18px; height:18px;
  border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 5px;
}
.sidebar-footer{ padding: 14px 12px; border-top: 1px solid var(--border); }
.btn-logout{
  width:100%; display:flex; align-items:center; gap:10px; justify-content:center;
  padding:10px; background:transparent; border:1px solid var(--border); border-radius:var(--radius-sm);
  color: var(--text-secondary); cursor:pointer; font-size:13.5px; font-weight:600;
}
.btn-logout:hover{ border-color: var(--signal-red); color:#fca5a5; }

.mobile-menu-btn{
  display:none; position:fixed; top:14px; right:14px; z-index:60;
  width:42px; height:42px; border-radius:10px;
  background: var(--surface-2); border:1px solid var(--border-light); color:var(--text-primary);
  font-size:18px; cursor:pointer; box-shadow: var(--shadow-md);
}
.sidebar-overlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:49;
}

.main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  position: sticky; top:0; background: rgba(15,23,41,0.85); backdrop-filter: blur(8px);
  z-index: 30;
}
.topbar h2{ font-family: var(--font-display); font-size: 21px; font-weight: 700; }
.topbar-right{ display:flex; align-items:center; gap:14px; }
.topbar-user{ font-size:14px; color: var(--text-secondary); font-weight:600; }

.view-container{ padding: 24px 28px 60px; max-width: 1400px; }

/* ===================== شبكات وبطاقات عامة ===================== */
.stats-grid{ display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:24px; }
.stat-card{
  background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; position:relative; overflow:hidden;
}
.stat-card .stat-icon{ font-size:20px; opacity:.85; margin-bottom:10px; display:block; }
.stat-card .stat-value{ font-family: var(--font-display); font-size: 28px; font-weight: 800; line-height:1; }
.stat-card .stat-label{ color: var(--text-secondary); font-size: 13px; margin-top:6px; font-weight:600; }
.stat-card.accent-green .stat-value{ color: var(--signal-green); }
.stat-card.accent-red .stat-value{ color: var(--signal-red); }
.stat-card.accent-amber .stat-value{ color: var(--accent); }
.stat-card.accent-blue .stat-value{ color: var(--signal-blue); }

.card{ background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.card-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
.card-header h3{ font-family: var(--font-display); font-size:17px; font-weight:700; }

/* ===================== شريط حالة "غرفة العمليات" — العنصر التوقيعي ===================== */
.status-ticker{
  display:flex; gap:10px; overflow-x:auto; padding: 4px 2px 14px; margin-bottom: 20px;
  scrollbar-width: thin;
}
.status-ticker::-webkit-scrollbar{ height:6px; }
.status-ticker::-webkit-scrollbar-thumb{ background: var(--border-light); border-radius:3px; }
.ticker-pill{
  flex-shrink:0; display:flex; align-items:center; gap:8px;
  background: var(--surface); border:1px solid var(--border);
  border-radius: 999px; padding: 8px 16px 8px 10px;
  font-size: 13px; font-weight:600; white-space:nowrap;
  cursor:pointer; transition: border-color .15s;
}
.ticker-pill:hover{ border-color: var(--border-light); }
.ticker-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ticker-dot.live{ background: var(--signal-green); box-shadow: 0 0 0 0 var(--signal-green); animation: pulse-dot 1.8s infinite; }
.ticker-dot.idle{ background: var(--signal-gray); }
.ticker-dot.alert{ background: var(--signal-red); animation: pulse-dot-red 1.4s infinite; }
@keyframes pulse-dot{
  0%{ box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
  70%{ box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  100%{ box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}
@keyframes pulse-dot-red{
  0%{ box-shadow: 0 0 0 0 rgba(239,68,68,0.55); }
  70%{ box-shadow: 0 0 0 6px rgba(239,68,68,0); }
  100%{ box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}
.ticker-name{ color: var(--text-primary); }
.ticker-sub{ color: var(--text-muted); font-size:11.5px; }

/* ===================== الجداول ===================== */
.table-wrap{ overflow-x:auto; border-radius: var(--radius-sm); border:1px solid var(--border); }
table{ width:100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
thead th{
  text-align: right; padding: 12px 16px; background: var(--surface-2);
  color: var(--text-secondary); font-weight:700; font-size:12.5px;
  border-bottom: 1px solid var(--border); white-space:nowrap;
}
tbody td{ padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align:middle; }
tbody tr:last-child td{ border-bottom:none; }
tbody tr:hover{ background: rgba(255,255,255,0.02); }
.table-empty{ text-align:center; padding: 50px 20px; color: var(--text-muted); }
.table-actions{ display:flex; gap:6px; justify-content:flex-end; }

.badge{
  display:inline-flex; align-items:center; gap:5px;
  padding: 4px 10px; border-radius:999px; font-size:12px; font-weight:700;
}
.badge-green{ background: var(--signal-green-dim); color: var(--signal-green); }
.badge-red{ background: var(--signal-red-dim); color: #fca5a5; }
.badge-amber{ background: var(--accent-glow); color: var(--accent); }
.badge-blue{ background: var(--signal-blue-dim); color: #93c5fd; }
.badge-gray{ background: rgba(100,116,139,0.18); color: var(--text-secondary); }

/* ===================== فورمات / مودالز ===================== */
.modal-overlay{
  position:fixed; inset:0; background: rgba(5,8,16,0.7); backdrop-filter: blur(3px);
  display:flex; align-items:center; justify-content:center; z-index: 200; padding:16px;
}
.modal{
  background: var(--surface); border:1px solid var(--border-light); border-radius: 16px;
  width: 100%; max-width: 560px; max-height: 88vh; display:flex; flex-direction:column;
  box-shadow: var(--shadow-lg);
}
.modal-sm{ max-width: 380px; }
.modal-header{
  display:flex; align-items:center; justify-content:space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--border); flex-shrink:0;
}
.modal-header h3{ font-family: var(--font-display); font-size:18px; font-weight:700; }
.modal-close{
  width:32px; height:32px; border-radius:8px; border:none; background: var(--surface-2);
  color: var(--text-secondary); cursor:pointer; font-size:15px;
}
.modal-close:hover{ background: var(--surface-hover); color:var(--text-primary); }
.modal-body{ padding: 22px; overflow-y:auto; }
.confirm-message{ font-size:15px; line-height:1.6; margin-bottom:20px; color:var(--text-primary); }
.confirm-actions{ display:flex; gap:10px; justify-content:flex-end; }

.form-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
.form-grid .field.full{ grid-column: 1 / -1; }
.field{ margin-bottom: 0; }
.form-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:22px; padding-top:18px; border-top:1px solid var(--border); }
.field-stack{ display:flex; flex-direction:column; gap:16px; }
.field-hint{ font-size:12px; color:var(--text-muted); margin-top:5px; }
.field-row-inline{ display:flex; gap:10px; align-items:flex-end; }
.field-row-inline .field{ flex:1; }

.photo-grid{ display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-top:10px; }
.photo-slot{
  aspect-ratio: 1; border-radius:10px; border:1.5px dashed var(--border-light);
  display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  background: var(--bg-base); cursor:pointer;
}
.photo-slot img{ width:100%; height:100%; object-fit:cover; }
.photo-slot .photo-remove{
  position:absolute; top:4px; left:4px; width:22px; height:22px; border-radius:50%;
  background: rgba(0,0,0,0.6); color:#fff; border:none; font-size:12px; cursor:pointer;
}
.photo-slot-label{ font-size:11px; color:var(--text-muted); text-align:center; padding:4px; }

/* ===================== توست ===================== */
.toast-container{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast{
  background: var(--surface-2); border:1px solid var(--border-light); color:var(--text-primary);
  padding: 12px 20px; border-radius: 10px; font-size:14px; font-weight:600;
  box-shadow: var(--shadow-md); display:flex; align-items:center; gap:10px;
  animation: toast-in .2s ease;
}
.toast.success{ border-color: rgba(34,197,94,0.4); }
.toast.success::before{ content:'✓'; color: var(--signal-green); font-weight:900; }
.toast.error{ border-color: rgba(239,68,68,0.4); }
.toast.error::before{ content:'!'; color: var(--signal-red); font-weight:900; }
@keyframes toast-in{ from{ opacity:0; transform: translateY(10px); } to{ opacity:1; transform:translateY(0); } }

/* ===================== الخريطة ===================== */
#mapView{ height: 560px; border-radius: var(--radius); overflow:hidden; border:1px solid var(--border); }
.leaflet-popup-content-wrapper{ background: var(--surface-2); color: var(--text-primary); border-radius: 10px; }
.leaflet-popup-tip{ background: var(--surface-2); }
.leaflet-popup-content{ font-family: var(--font-body); font-size:13.5px; direction: rtl; }
.map-legend{ display:flex; gap:18px; margin-top:14px; flex-wrap:wrap; }
.map-legend-item{ display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text-secondary); }
.map-legend-dot{ width:11px; height:11px; border-radius:50%; }

/* ===================== شريط بحث/فلترة ===================== */
.toolbar{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
.search-input-wrap{ position:relative; flex:1; min-width:200px; max-width:340px; }
.search-input-wrap input{
  width:100%; padding: 10px 14px 10px 36px;
  background: var(--surface); border:1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-primary); font-size:14px;
}
.search-input-wrap input:focus{ outline:none; border-color: var(--accent); }
.search-input-wrap .search-icon{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; }
.filter-select{
  padding: 10px 14px; background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary); font-size:13.5px; font-weight:600; cursor:pointer;
}

/* ===================== حالة فارغة ===================== */
.empty-state{ text-align:center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .empty-icon{ font-size:38px; display:block; margin-bottom:14px; opacity:.6; }
.empty-state p{ font-size:14.5px; margin-bottom: 18px; }

/* ===================== تبويبات ===================== */
.tabs{ display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.tab-btn{
  padding: 10px 18px; background:transparent; border:none; border-bottom:2px solid transparent;
  color: var(--text-secondary); font-weight:700; font-size:14px; cursor:pointer; margin-bottom:-1px;
}
.tab-btn.active{ color: var(--accent); border-bottom-color: var(--accent); }

/* ===================== تفاصيل سيارة / سائق ===================== */
.detail-header{ display:flex; align-items:center; gap:16px; margin-bottom: 22px; flex-wrap:wrap; }
.detail-avatar{
  width:60px; height:60px; border-radius: 14px; background: var(--surface-2);
  display:flex; align-items:center; justify-content:center; font-size: 26px; flex-shrink:0;
  border:1px solid var(--border-light);
}
.detail-info h2{ font-family: var(--font-display); font-size: 21px; font-weight:800; }
.detail-info p{ color: var(--text-secondary); font-size:13.5px; margin-top:3px; }
.detail-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; margin-bottom:22px; }
.detail-item{ background: var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; }
.detail-item .label{ font-size:12px; color:var(--text-muted); font-weight:600; margin-bottom:5px; }
.detail-item .value{ font-size:15px; font-weight:700; }

/* ===================== شاشات التحميل ===================== */
.loading-overlay{
  position:fixed; inset:0; z-index: 500;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  background: var(--bg-deep);
}
.app-loading-overlay{ background: rgba(11,18,32,0.92); backdrop-filter: blur(2px); }
.loading-spinner{
  width:40px; height:40px; border-radius:50%;
  border: 3px solid var(--border-light); border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}
@keyframes spin{ to{ transform: rotate(360deg); } }
.loading-overlay p{ color: var(--text-secondary); font-size:14px; font-weight:600; }

/* ===================== مؤشر حالة المزامنة ===================== */
.sync-status{
  text-align:center; font-size:12px; font-weight:700; padding: 7px 0 12px;
  color: var(--text-muted); transition: color .2s;
}
.sync-status.sync-syncing{ color: var(--accent); }
.sync-status.sync-synced{ color: var(--signal-green); }
.sync-status.sync-error{ color: var(--signal-red); }
.sync-status.sync-offline{ color: var(--text-muted); }

/* ===================== الاستجابة (Mobile) ===================== */
@media (max-width: 920px){
  .sidebar{
    position:fixed; right: -260px; top:0; height:100vh; width:240px;
    transition: right .25s ease; box-shadow: var(--shadow-lg);
  }
  .sidebar.open{ right:0; }
  .sidebar-overlay.show{ display:block; }
  .mobile-menu-btn{ display:flex; align-items:center; justify-content:center; }
  .topbar{ padding: 16px 18px 16px 18px; padding-right: 64px; }
  .view-container{ padding: 18px 16px 50px; }
  .stats-grid{ grid-template-columns: repeat(2, 1fr); }

<script>
/* ===========================================================
   ملك السيارات — طبقة Firebase Realtime Database
   تستبدل localStorage بالكامل لتخزين سحابي يعمل على أي جهاز
   =========================================================== */
(function(){
'use strict';

/* رابط قاعدة البيانات الحقيقي (مؤكد من Firebase Console) */
const FIREBASE_BASE_URL = 'https://king-of-cars-d5182-default-rtdb.firebaseio.com';

/* ===================== أدوات أساسية ===================== */
function uid(prefix){
  return (prefix||'id') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
}
function nowISO(){ return new Date().toISOString(); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(d){
  if(!d) return '—';
  try{
    const dt = new Date(d);
    if(isNaN(dt.getTime())) return d;
    return dt.toLocaleDateString('en-GB', { year:'numeric', month:'short', day:'numeric', calendar:'gregory' });
  }catch(e){ return d; }
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const target = new Date(dateStr);
  if(isNaN(target.getTime())) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / (1000*60*60*24));
}
function debounce(fn, wait){
  let t;
  return function(...args){
    clearTimeout(t);
    t = setTimeout(()=>fn.apply(this,args), wait);
  };
}
async function hashPassword(pw){
  const enc = new TextEncoder().encode('mok_alsayarat_salt_v1_' + pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ===================== توست ===================== */
function showToast(msg, type){
  const container = document.getElementById('toastContainer');
  if(!container) return;
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(()=>{
    el.style.transition = 'opacity .25s, transform .25s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(8px)';
    setTimeout(()=>el.remove(), 250);
  }, 2600);
}

/* ===================== مؤشر حالة الاتصال بالفايربيز ===================== */
let syncStatusEl = null;
function setSyncStatus(status){
  // status: 'syncing' | 'synced' | 'error' | 'offline'
  if(!syncStatusEl) syncStatusEl = document.getElementById('syncStatus');
  if(!syncStatusEl) return;
  const map = {
    syncing: { text: '⏳ جاري الحفظ...', cls: 'sync-syncing' },
    synced:  { text: '☁️ محفوظ', cls: 'sync-synced' },
    error:   { text: '⚠️ فشل الحفظ', cls: 'sync-error' },
    offline: { text: '📡 غير متصل', cls: 'sync-offline' }
  };
  const s = map[status] || map.synced;
  syncStatusEl.textContent = s.text;
  syncStatusEl.className = 'sync-status ' + s.cls;
}

/* ===================== طبقة Firebase REST (مع إعادة محاولة تلقائية) ===================== */
async function fetchWithRetry(url, options, retries){
  retries = retries === undefined ? 2 : retries;
  let lastErr;
  for(let attempt = 0; attempt <= retries; attempt++){
    try{
      return await fetch(url, options);
    }catch(e){
      lastErr = e;
      if(attempt < retries){
        await new Promise(r => setTimeout(r, 400 * (attempt + 1)));
      }
    }
  }
  throw lastErr;
}

async function fbGet(path){
  try{
    const res = await fetchWithRetry(`${FIREBASE_BASE_URL}/${path}.json`);
    if(!res.ok){
      const bodyText = await res.text().catch(()=> '');
      throw new Error(`فشل الاتصال بقاعدة البيانات (HTTP ${res.status}) ${bodyText.slice(0,150)}`);
    }
    return res.json();
  }catch(e){
    if(e instanceof TypeError){
      throw new Error('تعذر الوصول إلى الفايربيز (فشل الشبكة): ' + e.message);
    }
    throw e;
  }
}
async function fbSet(path, data){
  try{
    const res = await fetchWithRetry(`${FIREBASE_BASE_URL}/${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if(!res.ok){
      const bodyText = await res.text().catch(()=> '');
      throw new Error(`فشل حفظ البيانات (HTTP ${res.status}) ${bodyText.slice(0,150)}`);
    }
    return res.json();
  }catch(e){
    if(e instanceof TypeError){
      throw new Error('تعذر الوصول إلى الفايربيز (فشل الشبكة): ' + e.message);
    }
    throw e;
  }
}
async function fbPatch(path, data){
  try{
    const res = await fetchWithRetry(`${FIREBASE_BASE_URL}/${path}.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if(!res.ok){
      const bodyText = await res.text().catch(()=> '');
      throw new Error(`فشل تحديث البيانات (HTTP ${res.status}) ${bodyText.slice(0,150)}`);
    }
    return res.json();
  }catch(e){
    if(e instanceof TypeError){
      throw new Error('تعذر الوصول إلى الفايربيز (فشل الشبكة): ' + e.message);
    }
    throw e;
  }
}

/* تحويل بين الكائن (object بمفاتيح id) ومصفوفة، لأن فايربيز يخزن كقوائم مفاتيح */
function objToArray(obj){
  if(!obj) return [];
  return Object.values(obj);
}
function arrayToObj(arr){
  const obj = {};
  (arr||[]).forEach(item=>{ if(item && item.id) obj[item.id] = item; });
  return obj;
}

/* ===================== حفظ مع تأخير ذكي (Debounce) لتقليل الطلبات ===================== */
const pendingSaves = {};
function queueSave(key, arr){
  setSyncStatus('syncing');
  if(pendingSaves[key]) clearTimeout(pendingSaves[key]);
  pendingSaves[key] = setTimeout(async ()=>{
    try{
      await fbSet(key, arrayToObj(arr));
      setSyncStatus('synced');
    }catch(e){
      console.error('Save error', key, e);
      setSyncStatus('error');
      showToast('فشل حفظ البيانات في الفايربيز — تحقق من اتصال الإنترنت', 'error');
    }
  }, 500);
}
/* حفظ فوري بدون تأخير (للعمليات الحساسة مثل الحذف أو تسجيل الدخول) */
async function saveImmediate(key, arr){
  setSyncStatus('syncing');
  try{
    await fbSet(key, arrayToObj(arr));
    setSyncStatus('synced');
    return true;
  }catch(e){
    console.error('Save error', key, e);
    setSyncStatus('error');
    showToast('فشل حفظ البيانات في الفايربيز — تحقق من اتصال الإنترنت', 'error');
    return false;
  }
}

/* ===================== State ===================== */
const state = {
  vehicles: [],
  drivers: [],
  documents: [],
  maintenance: [],
  alerts: [],
  currentView: 'dashboard',
  map: null,
  mapMarkers: {},
  geofenceCircles: {},
  dataLoaded: false
};

async function loadAllData(){
  setSyncStatus('syncing');
  try{
    const [vehicles, drivers, documents, maintenance, alerts] = await Promise.all([
      fbGet('vehicles'), fbGet('drivers'), fbGet('documents'), fbGet('maintenance'), fbGet('alerts')
    ]);
    state.vehicles = objToArray(vehicles);
    state.drivers = objToArray(drivers);
    state.documents = objToArray(documents);
    state.maintenance = objToArray(maintenance);
    state.alerts = objToArray(alerts);
    state.dataLoaded = true;
    setSyncStatus('synced');
    return true;
  }catch(e){
    console.error('Load error', e);
    setSyncStatus('error');
    showToast('تعذر تحميل البيانات من الفايربيز — تحقق من اتصال الإنترنت', 'error');
    return false;
  }
}

function saveVehicles(){ queueSave('vehicles', state.vehicles); }
function saveDrivers(){ queueSave('drivers', state.drivers); }
function saveDocuments(){ queueSave('documents', state.documents); }
function saveMaintenance(){ queueSave('maintenance', state.maintenance); }
function saveAlerts(){ queueSave('alerts', state.alerts); }

function saveVehiclesImmediate(){ return saveImmediate('vehicles', state.vehicles); }
function saveDriversImmediate(){ return saveImmediate('drivers', state.drivers); }
function saveDocumentsImmediate(){ return saveImmediate('documents', state.documents); }
function saveMaintenanceImmediate(){ return saveImmediate('maintenance', state.maintenance); }
function saveAlertsImmediate(){ return saveImmediate('alerts', state.alerts); }

function findCityByName(name){
  return SAUDI_CITIES.find(c => c.name === name);
}
function distanceKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ===================== المصادقة (محفوظة بالفايربيز الآن) ===================== */
async function getAuth(){
  return fbGet('auth'); // نترك الخطأ يصعد للمستدعي للتعامل معه بشكل صحيح
}

/* تصدير */
window.__mok = {

/* ===========================================================
   ملك السيارات — أداة القص (Image Cropper) + PWA Setup
   =========================================================== */
(function(){
'use strict';

/* ===================== أداة القص ===================== */
window.openImageCropper = function(file, aspectRatio, onCrop){
  aspectRatio = aspectRatio || 1;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      // إنشاء طبقة القص
      const overlay = document.createElement('div');
      overlay.className = 'cropper-overlay';
      overlay.id = 'cropperOverlay';

      const SIZE = Math.min(window.innerWidth - 60, 440);
      let scale = Math.max(SIZE / img.naturalWidth, SIZE / img.naturalHeight) * 0.9;
      let minScale = scale;
      let offsetX = 0, offsetY = 0;
      let dragging = false, lastX, lastY;

      overlay.innerHTML = `
        <div class="cropper-box" style="max-width:${SIZE+40}px">
          <h3>✂️ قص الصورة</h3>
          <div class="cropper-canvas-wrap" id="cropCanvasWrap" style="width:${SIZE}px;height:${SIZE}px;margin:0 auto">
            <canvas id="cropCanvas" width="${SIZE}" height="${SIZE}"></canvas>
          </div>
          <div class="cropper-zoom-bar">
            <span style="color:var(--text-muted);font-size:13px">تكبير</span>
            <input type="range" id="cropZoom" min="1" max="5" step="0.05" value="1">
          </div>
          <p style="text-align:center;font-size:12px;color:var(--text-muted)">اسحب الصورة لتحديد الجزء المناسب</p>
          <div class="cropper-controls">
            <button class="btn btn-ghost" id="cropCancelBtn">إلغاء</button>
            <button class="btn btn-primary" id="cropConfirmBtn">✓ حفظ</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      const canvas = document.getElementById('cropCanvas');
      const ctx = canvas.getContext('2d');
      const zoomInput = document.getElementById('cropZoom');

      function draw(){
        ctx.clearRect(0,0,SIZE,SIZE);
        const w = img.naturalWidth * scale;
        const h = img.naturalHeight * scale;
        // تقييد الإزاحة
        const maxOx = Math.max(0, w - SIZE);
        const maxOy = Math.max(0, h - SIZE);
        offsetX = Math.max(-maxOx, Math.min(0, offsetX));
        offsetY = Math.max(-maxOy, Math.min(0, offsetY));
        ctx.drawImage(img, offsetX, offsetY, w, h);
        // إطار دائري
        ctx.save();
        ctx.fillStyle = 'rgba(11,18,32,0.45)';
        ctx.fillRect(0,0,SIZE,SIZE);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(SIZE/2, SIZE/2, SIZE*0.45, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        // حافة الدائرة
        ctx.strokeStyle = 'rgba(245,166,35,0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(SIZE/2, SIZE/2, SIZE*0.45, 0, Math.PI*2);
        ctx.stroke();
      }

      zoomInput.addEventListener('input', function(){
        scale = minScale * parseFloat(this.value);
        draw();
      });

      // السحب بالماوس
      canvas.addEventListener('mousedown', function(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; });
      window.addEventListener('mousemove', function(e){
        if(!dragging) return;
        offsetX += e.clientX - lastX; offsetY += e.clientY - lastY;
        lastX=e.clientX; lastY=e.clientY; draw();
      });
      window.addEventListener('mouseup', ()=>{ dragging=false; });
      // اللمس (موبايل)
      canvas.addEventListener('touchstart', function(e){ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
      canvas.addEventListener('touchmove', function(e){
        if(!dragging) return;
        offsetX += e.touches[0].clientX - lastX; offsetY += e.touches[0].clientY - lastY;
        lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; draw(); e.preventDefault();
      }, {passive:false});
      canvas.addEventListener('touchend', ()=>{ dragging=false; });

      draw();

      document.getElementById('cropCancelBtn').addEventListener('click', function(){
        overlay.remove();
      });
      document.getElementById('cropConfirmBtn').addEventListener('click', function(){
        // استخراج المنطقة الدائرية كـ PNG شفاف
        const outCanvas = document.createElement('canvas');
        const R = Math.round(SIZE * 0.45);
        const D = R * 2;
        outCanvas.width = D; outCanvas.height = D;
        const outCtx = outCanvas.getContext('2d');
        outCtx.beginPath();
        outCtx.arc(R, R, R, 0, Math.PI*2);
        outCtx.closePath();
        outCtx.clip();
        // نسخ المنطقة الدائرية من canvas الرئيسي
        const cx = Math.round(SIZE/2 - R);
        const cy = Math.round(SIZE/2 - R);
        outCtx.drawImage(canvas, cx, cy, D, D, 0, 0, D, D);
        const dataUrl = outCanvas.toDataURL('image/png');
        overlay.remove();
        onCrop(dataUrl);
      });
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

  if(v.status === 'inactive') return 'idle';

}

/* ===================== محرك التنبيهات ===================== */
function runAlertEngine(){
  if(!state.dataLoaded) return;
  let newAlerts = [];

  state.documents.forEach(doc=>{
    if(!doc.expiryDate) return;
    const d = daysUntil(doc.expiryDate);
    if(d === null) return;
    const alertKey = 'doc_'+doc.id;
    const existing = state.alerts.find(a=>a.key===alertKey && !a.resolved);
    if(d <= 30){
      const severity = d < 0 ? 'red' : (d <= 7 ? 'red' : 'amber');
      const v = getVehicleById(doc.vehicleId);
      const plate = v ? v.plate : '';
      const msg = d < 0
        ? `وثيقة "${doc.title}" للسيارة "${plate}" منتهية منذ ${Math.abs(d)} يوم`
        : `وثيقة "${doc.title}" للسيارة "${plate}" تنتهي بعد ${d} يوم`;
      if(!existing){
        newAlerts.push(makeAlert('document', doc.vehicleId, alertKey, msg, severity));
      }
    } else if(existing){
      existing.resolved = true;
    }
  });

  // تنبيهات رخصة السائقين
  state.drivers.forEach(d=>{
    if(!d.licenseExpiry) return;
    const days = daysUntil(d.licenseExpiry);
    if(days === null) return;
    const alertKey = 'license_'+d.id;
    const existing = state.alerts.find(a=>a.key===alertKey && !a.resolved);
    if(days <= 30){
      const severity = days < 0 ? 'red' : (days <= 7 ? 'red' : 'amber');
      const msg = days < 0
        ? `رخصة قيادة السائق "${d.name}" منتهية منذ ${Math.abs(days)} يوم`
        : `رخصة قيادة السائق "${d.name}" تنتهي بعد ${days} يوم`;
      if(!existing){
        newAlerts.push({ id: M.uid('alert'), type:'license', vehicleId:null, key:alertKey, message:msg, severity, resolved:false, createdAt:M.nowISO() });
      }
    } else if(existing){
      existing.resolved = true;
    }
  });

  state.vehicles.forEach(v=>{
    if(!v.nextMaintenanceKm || !v.odometer) return;
    const remaining = v.nextMaintenanceKm - v.odometer;
    const alertKey = 'maint_'+v.id;
    const existing = state.alerts.find(a=>a.key===alertKey && !a.resolved);
    if(remaining <= 500){
      const severity = remaining <= 0 ? 'red' : 'amber';
      const msg = remaining <= 0
        ? `السيارة "${v.plate}" تجاوزت موعد الصيانة بـ ${Math.abs(remaining)} كم`
        : `متبقي ${remaining} كم على موعد صيانة السيارة "${v.plate}"`;
      if(!existing){
        newAlerts.push(makeAlert('maintenance', v.id, alertKey, msg, severity));
      }
    } else if(existing){
      existing.resolved = true;
    }
  });

  state.vehicles.forEach(v=>{
    if(!v.lat || !v.lng || !v.assignedCity) return;
    const city = M.findCityByName(v.assignedCity);
    if(!city) return;
    const dist = M.distanceKm(v.lat, v.lng, city.lat, city.lng);
    const alertKey = 'geo_'+v.id;
    const existing = state.alerts.find(a=>a.key===alertKey && !a.resolved);
    if(dist > city.radius){
      const msg = `السيارة "${v.plate}" خرجت عن حدود مدينة ${v.assignedCity} (تبعد ${Math.round(dist)} كم عن المركز)`;
      if(!existing){
        newAlerts.push(makeAlert('geofence', v.id, alertKey, msg, 'red'));
      }
    } else if(existing){
      existing.resolved = true;
    }
  });

  if(newAlerts.length){
    state.alerts = [...newAlerts, ...state.alerts];
  }
  M.saveAlerts();
  updateAlertsBadge();
  if(state.currentView === 'alerts') window.renderAlertsView();
  if(state.currentView === 'dashboard') window.renderDashboard();
}
function makeAlert(type, vehicleId, key, message, severity){

    id: M.uid('alert'), type, vehicleId, key, message, severity,
    resolved:false, createdAt: M.nowISO()
  };
}

}

(function(){

const { state, escapeHtml, fmtDate, daysUntil, showToast, showConfirm, openModal, closeModal, uid } = M;

let vehiclesSearchTerm = '';

const DOC_TYPES = [

    vehiclesSearchTerm = e.target.value;

  document.getElementById('vehicleCityFilter').addEventListener('change', function(e){
    vehiclesCityFilter = e.target.value; renderVehiclesTable();

window.renderVehiclesView = renderVehiclesView;

function filteredVehicles(){
  const term = vehiclesSearchTerm.trim().toLowerCase();
  return state.vehicles.filter(v=>{
    if(vehiclesCityFilter && v.assignedCity !== vehiclesCityFilter) return false;
    if(vehiclesStatusFilter && window.getVehicleStatus(v) !== vehiclesStatusFilter) return false;
    if(!term) return true;
    const driver = window.getVehicleDriver(v);
    const haystack = [
      v.plate, v.model, v.brand, v.color, v.year,
      driver ? driver.name : '', driver ? driver.phone : ''
    ].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(term);
  });
}

function renderVehiclesTable(){
  const wrap = document.getElementById('vehiclesTableWrap');
  const list = filteredVehicles();
  if(!list.length){
    wrap.innerHTML = `<div class="empty-state">

            : `<div style="width:36px;height:36px;border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border)">🚗</div>`;
          return `<tr>
            <td style="width:44px">${avatarHtml}</td>
            <td><strong>${escapeHtml(v.plate)}</strong> ${v.ownership==='leased'?'<span class="badge badge-blue" style="font-size:10px;padding:2px 7px">إيجار</span>':''}</td>
            <td>${escapeHtml(v.brand||'')} ${escapeHtml(v.model||'')} ${v.year?('('+v.year+')'):''}</td>
            <td>${driver ? escapeHtml(driver.name) : '<span style="color:var(--text-muted)">بدون سائق</span>'}</td>
            <td>${v.assignedCity ? escapeHtml(v.assignedCity) : '—'}</td>

            <td>${window.statusBadge(status)}</td>
            <td>
              <div class="table-actions">
                <button class="btn btn-sm btn-ghost" onclick="openVehicleDetail('${v.id}')">عرض</button>
                <button class="btn btn-sm btn-icon btn-ghost" title="تعديل" onclick="openVehicleForm('${v.id}')">✏️</button>
                <button class="btn btn-sm btn-icon btn-danger" title="حذف" onclick="deleteVehicle('${v.id}')">🗑️</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  `;
}

/* ===================== نموذج إضافة/تعديل سيارة (مدمج مع الوثائق) ===================== */
function openVehicleForm(vehicleId){
  const editing = vehicleId ? state.vehicles.find(v=>v.id===vehicleId) : null;
  const driversOptions = state.drivers.map(d=>`<option value="${d.id}" ${editing&&editing.driverId===d.id?'selected':''}>${escapeHtml(d.name)}</option>`).join('');
  const citiesOptions = M.SAUDI_CITIES.map(c=>`<option value="${c.name}" ${editing&&editing.assignedCity===c.name?'selected':''}>${c.name}</option>`).join('');

  // الوثائق الحالية لهذي السيارة (لو كانت موجودة)، مفهرسة بالنوع
  const existingDocs = {};
  if(editing){
    DOC_TYPES.forEach(t=>{
      const doc = window.getVehicleDocByType(editing.id, t.label);
      if(doc) existingDocs[t.key] = doc;
    });
  }

  const docsFieldsHtml = DOC_TYPES.map(t=>{
    const doc = existingDocs[t.key];
    return `
      <div class="field">
        <label>تاريخ انتهاء ${t.label}</label>
        <input type="date" id="doc_${t.key}" value="${doc?doc.expiryDate||'':''}">
      </div>
    `;
  }).join('');

  const body = `
    <form id="vehicleForm" class="field-stack">
      <div class="form-grid">
        <div class="field"><label>رقم اللوحة *</label><input type="text" id="vPlate" required value="${editing?escapeHtml(editing.plate):''}"></div>
        <div class="field"><label>الماركة</label><input type="text" id="vBrand" value="${editing?escapeHtml(editing.brand||''):''}" placeholder="مثال: تويوتا"></div>
        <div class="field"><label>الموديل</label><input type="text" id="vModel" value="${editing?escapeHtml(editing.model||''):''}" placeholder="مثال: هايلكس"></div>
        <div class="field"><label>سنة الصنع</label><input type="number" id="vYear" value="${editing?editing.year||'':''}" min="1990" max="2030"></div>
        <div class="field"><label>اللون</label><input type="text" id="vColor" value="${editing?escapeHtml(editing.color||''):''}"></div>
        <div class="field"><label>الممشى الحالي (كم)</label><input type="number" id="vOdometer" value="${editing?(editing.odometer||''):''}" min="0" placeholder="0"></div>
        <div class="field"><label>السائق المسؤول</label>
          <select id="vDriver"><option value="">بدون سائق</option>${driversOptions}</select>
        </div>
        <div class="field"><label>المدينة المخصصة (للسياج الجغرافي)</label>
          <select id="vCity"><option value="">بدون تحديد</option>${citiesOptions}</select>
        </div>
        <div class="field"><label>موعد الصيانة القادم عند (كم)</label><input type="number" id="vNextMaint" value="${editing?editing.nextMaintenanceKm||'':''}" min="0" placeholder="مثال: 50000"></div>
        <div class="field"><label>نوع الملكية</label>
          <select id="vOwnership">
            <option value="owned" ${editing&&editing.ownership==='owned'?'selected':editing&&editing.ownership?'':'selected'}>🏷️ ملك</option>
            <option value="leased" ${editing&&editing.ownership==='leased'?'selected':''}>📋 إيجار</option>
          </select>
        </div>
        <div class="field"><label>الحالة</label>
          <select id="vStatus">
            <option value="active" ${editing&&editing.status==='active'?'selected':''}>نشطة</option>
            <option value="inactive" ${editing&&editing.status==='inactive'?'selected':''}>متوقفة</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>موقع السيارة (GPS)</label>
        <div class="field-row-inline">
          <div class="field"><input type="text" id="vLat" placeholder="خط العرض (Lat)" value="${editing&&editing.lat?editing.lat:''}"></div>
          <div class="field"><input type="text" id="vLng" placeholder="خط الطول (Lng)" value="${editing&&editing.lng?editing.lng:''}"></div>
          <button type="button" class="btn btn-ghost" id="useMyLocationBtn">📍 موقعي الحالي</button>
        </div>
        <p class="field-hint">أدخل الإحداثيات يدوياً، أو اضغط "موقعي الحالي" لاستخدام موقعك الحالي من المتصفح (يطلب صلاحية الموقع).</p>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:18px;margin-top:4px">
        <p style="font-family:var(--font-display);font-weight:700;font-size:15px;margin-bottom:14px">📄 وثائق السيارة</p>
        <p class="field-hint" style="margin-top:-8px;margin-bottom:14px">أدخل تواريخ الانتهاء لكل وثيقة متوفرة لديك الآن. اترك الحقل فارغاً إذا لم تكن الوثيقة متوفرة بعد — يمكنك إضافتها لاحقاً من نفس النموذج.</p>
        <div class="form-grid">
          ${docsFieldsHtml}
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="vCancelBtn">إلغاء</button>
        <button type="submit" class="btn btn-primary">${editing?'حفظ التعديلات':'إضافة السيارة'}</button>
      </div>
    </form>
  `;

  openModal(editing?'تعديل سيارة':'إضافة سيارة جديدة', body, { width:'680px' });

  document.getElementById('vCancelBtn').addEventListener('click', closeModal);
  document.getElementById('useMyLocationBtn').addEventListener('click', function(){
    if(!navigator.geolocation){
      showToast('المتصفح لا يدعم تحديد الموقع', 'error');
      return;
    }
    const btn = this;
    btn.disabled = true; btn.textContent = '⏳ جاري التحديد...';
    navigator.geolocation.getCurrentPosition(function(pos){
      document.getElementById('vLat').value = pos.coords.latitude.toFixed(6);
      document.getElementById('vLng').value = pos.coords.longitude.toFixed(6);
      btn.disabled = false; btn.textContent = '📍 موقعي الحالي';
      showToast('تم تحديد الموقع بنجاح', 'success');
    }, function(err){
      btn.disabled = false; btn.textContent = '📍 موقعي الحالي';
      showToast('تعذر تحديد الموقع: ' + (err.message||'تحقق من صلاحيات الموقع'), 'error');
    }, { enableHighAccuracy:true, timeout:10000 });
  });

  document.getElementById('vehicleForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const plate = document.getElementById('vPlate').value.trim();
    if(!plate){ showToast('رقم اللوحة مطلوب', 'error'); return; }

    const submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.disabled = true; submitBtn.textContent = 'جاري الحفظ...';

    const latVal = document.getElementById('vLat').value.trim();
    const lngVal = document.getElementById('vLng').value.trim();

    const data = {
      plate,
      brand: document.getElementById('vBrand').value.trim(),
      model: document.getElementById('vModel').value.trim(),
      year: document.getElementById('vYear').value ? parseInt(document.getElementById('vYear').value) : null,
      color: document.getElementById('vColor').value.trim(),
      odometer: document.getElementById('vOdometer').value ? parseInt(document.getElementById('vOdometer').value) : 0,
      driverId: document.getElementById('vDriver').value || null,
      assignedCity: document.getElementById('vCity').value || null,
      nextMaintenanceKm: document.getElementById('vNextMaint').value ? parseInt(document.getElementById('vNextMaint').value) : null,
      status: document.getElementById('vStatus').value,
      ownership: document.getElementById('vOwnership').value || 'owned',
      lat: latVal ? parseFloat(latVal) : null,
      lng: lngVal ? parseFloat(lngVal) : null,
      lastLocationUpdate: (latVal && lngVal) ? M.nowISO() : (editing?editing.lastLocationUpdate:null)
    };

    let vehicleRecord;
    if(editing){
      Object.assign(editing, data, { updatedAt: M.nowISO() });
      vehicleRecord = editing;
    } else {
      vehicleRecord = Object.assign({ id: uid('veh'), createdAt: M.nowISO(), inspectionPhotos: [] }, data);
      state.vehicles.push(vehicleRecord);
    }

    // معالجة الوثائق المدمجة بالنموذج
    DOC_TYPES.forEach(t=>{
      const val = document.getElementById('doc_'+t.key).value;
      let doc = window.getVehicleDocByType(vehicleRecord.id, t.label);
      if(val){
        if(doc){
          doc.expiryDate = val;
          doc.updatedAt = M.nowISO();
        } else {
          state.documents.push({
            id: uid('doc'), vehicleId: vehicleRecord.id, title: t.label,
            expiryDate: val, notes: '', createdAt: M.nowISO()
          });
        }
      } else if(doc){
        // المستخدم مسح التاريخ: نحذف الوثيقة المرتبطة بهذا النوع
        state.documents = state.documents.filter(d=>d.id!==doc.id);
        state.alerts = state.alerts.filter(a=>a.key !== 'doc_'+doc.id);
      }
    });

    const ok1 = await M.saveVehiclesImmediate();
    const ok2 = await M.saveDocumentsImmediate();

    if(ok1 && ok2){
      showToast(editing?'تم تحديث بيانات السيارة والوثائق':'تمت إضافة السيارة والوثائق بنجاح', 'success');
      closeModal();
      window.runAlertEngine();
      renderVehiclesTable();
      if(state.currentView==='dashboard') window.renderDashboard();
    } else {
      submitBtn.disabled = false; submitBtn.textContent = editing?'حفظ التعديلات':'إضافة السيارة';
    }
  });
}
window.openVehicleForm = openVehicleForm;

function deleteVehicle(id){
  const v = state.vehicles.find(x=>x.id===id);
  if(!v) return;
  showConfirm(`هل تريد حذف السيارة "${v.plate}"؟ سيتم حذف كل البيانات المرتبطة بها (وثائق، صيانة، تنبيهات). لا يمكن التراجع عن هذا الإجراء.`, async function(){
    state.vehicles = state.vehicles.filter(x=>x.id!==id);
    state.documents = state.documents.filter(d=>d.vehicleId!==id);
    state.maintenance = state.maintenance.filter(m=>m.vehicleId!==id);
    state.alerts = state.alerts.filter(a=>a.vehicleId!==id);
    await Promise.all([
      M.saveVehiclesImmediate(), M.saveDocumentsImmediate(), M.saveMaintenanceImmediate(), M.saveAlertsImmediate()
    ]);
    showToast('تم حذف السيارة', 'success');
    renderVehiclesTable();
    window.updateAlertsBadge();
    if(state.currentView==='dashboard') window.renderDashboard();
  });
}
window.deleteVehicle = deleteVehicle;

    <div class="map-legend">
      <div class="map-legend-item"><span class="map-legend-dot" style="background:#22C55E"></span> نشطة</div>

      <div class="map-legend-item"><span class="map-legend-dot" style="background:#64748B"></span> متوقفة</div>
      <div class="map-legend-item"><span class="map-legend-dot" style="background:#F5A623;opacity:.5;border:1px solid #F5A623"></span> السياج الجغرافي للمدينة</div>
    </div>
  `;

  initOrUpdateMap(withLocation);

window.renderMapView = renderMapView;

function initOrUpdateMap(vehicles){
  if(state.map){
    try{ state.map.remove(); }catch(e){}
    state.map = null;
    state.mapMarkers = {};
    state.geofenceCircles = {};
  }

  const center = vehicles.length ? [vehicles[0].lat, vehicles[0].lng] : [24.7136, 46.6753];
  const map = L.map('mapView', { zoomControl: true }).setView(center, vehicles.length ? 6 : 5);
  state.map = map;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  const usedCities = new Set();
  vehicles.forEach(v=>{
    if(v.assignedCity) usedCities.add(v.assignedCity);
  });
  usedCities.forEach(cityName=>{
    const city = M.findCityByName(cityName);
    if(!city) return;
    L.circle([city.lat, city.lng], {
      radius: city.radius * 1000,
      color: '#F5A623', weight: 1.5, fillColor:'#F5A623', fillOpacity: 0.06, dashArray: '5,6'
    }).addTo(map).bindPopup(`<strong>السياج الجغرافي: ${escapeHtml(cityName)}</strong><br>نطاق ${city.radius} كم`);
  });

  const bounds = [];
  vehicles.forEach(v=>{
    const status = window.getVehicleStatus(v);
    const color = status==='alert' ? '#EF4444' : (status==='active' ? '#22C55E' : '#64748B');
    const driver = window.getVehicleDriver(v);

    const icon = L.divIcon({
      html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2.5px solid #0F1729;box-shadow:0 0 0 2px ${color}55"></div>`,
      className: '', iconSize: [16,16], iconAnchor: [8,8]
    });

    const marker = L.marker([v.lat, v.lng], { icon }).addTo(map);
    marker.bindPopup(`
      <strong>${escapeHtml(v.plate)}</strong><br>
      ${escapeHtml(v.brand||'')} ${escapeHtml(v.model||'')}<br>
      السائق: ${driver?escapeHtml(driver.name):'بدون سائق'}<br>
      ${v.assignedCity ? 'المدينة المخصصة: '+escapeHtml(v.assignedCity) : ''}
    `);
    bounds.push([v.lat, v.lng]);
  });

  if(bounds.length > 1){
    map.fitBounds(bounds, { padding: [40,40] });
  } else if(bounds.length === 1){
    map.setView(bounds[0], 11);
  }

  setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, 150);
}

})();

  const headHtml = headers.map(h=>`<th style="background:#1A2438;color:#fff;font-weight:bold;padding:8px;border:1px solid #ccc;white-space:nowrap">${h}</th>`).join('');
  const rowsHtml = rows.map(r=>{

  a.href = url;

function docStatusText(expiryDate){
  if(!expiryDate) return 'غير مسجل';
  const d = daysUntil(expiryDate);
  if(d === null) return 'غير مسجل';
  if(d < 0) return 'منتهية';
  if(d <= 30) return 'تنتهي قريباً';
  return 'سارية';
}

function exportFullReport(){
  if(!state.vehicles.length){
    showToast('لا توجد سيارات لتصديرها', 'error');
    return;
  }

  const headers = [
    'رقم اللوحة', 'الماركة', 'الموديل', 'سنة الصنع', 'السائق المسؤول', 'رقم جوال السائق',
    'المدينة', 'الممشى الحالي (كم)',
    'تاريخ انتهاء الفحص الدوري', 'حالة الفحص الدوري',
    'تاريخ انتهاء الاستمارة', 'حالة الاستمارة',
    'تاريخ انتهاء التأمين', 'حالة التأمين',
    'تاريخ آخر صيانة', 'نوع آخر صيانة', 'الممشى عند آخر صيانة (كم)',
    'موعد الصيانة القادمة (كم)', 'المتبقي حتى الصيانة القادمة (كم)'
  ];

  const rows = state.vehicles.map(v=>{
    const driver = window.getVehicleDriver(v);
    const inspectionDoc = window.getVehicleDocByType(v.id, 'فحص دوري (فني)');
    const registrationDoc = window.getVehicleDocByType(v.id, 'استمارة (رخصة سير)');
    const insuranceDoc = window.getVehicleDocByType(v.id, 'تأمين');
    const lastMaint = window.getVehicleLastMaintenance(v.id);
    const remaining = (v.nextMaintenanceKm && v.odometer) ? (v.nextMaintenanceKm - v.odometer) : null;

    return [
      v.plate,
      v.brand || '',
      v.model || '',
      v.year || '',
      driver ? driver.name : 'بدون سائق',
      driver ? driver.phone || '' : '',
      v.assignedCity || '',
      v.odometer ? v.odometer.toLocaleString('en-US') : '0',
      inspectionDoc ? fmtDate(inspectionDoc.expiryDate) : 'غير مسجل',
      inspectionDoc ? docStatusText(inspectionDoc.expiryDate) : 'غير مسجل',
      registrationDoc ? fmtDate(registrationDoc.expiryDate) : 'غير مسجل',
      registrationDoc ? docStatusText(registrationDoc.expiryDate) : 'غير مسجل',
      insuranceDoc ? fmtDate(insuranceDoc.expiryDate) : 'غير مسجل',
      insuranceDoc ? docStatusText(insuranceDoc.expiryDate) : 'غير مسجل',
      lastMaint ? fmtDate(lastMaint.date) : 'لا يوجد سجل',
      lastMaint ? lastMaint.type : '—',
      lastMaint && lastMaint.odometerAt ? lastMaint.odometerAt.toLocaleString('en-US') : '—',
      v.nextMaintenanceKm ? v.nextMaintenanceKm.toLocaleString('en-US') : 'غير محدد',
      remaining !== null ? (remaining <= 0 ? `تجاوزت بـ ${Math.abs(remaining).toLocaleString('en-US')}` : remaining.toLocaleString('en-US')) : '—'
    ];
  });

  const html = buildSheetHtml(headers, rows);
  downloadBlob(html, `تقرير-شامل-السيارات-${M.todayStr()}.xls`);
  showToast('تم تصدير التقرير الشامل', 'success');
}

function exportDriversReport(){
  if(!state.drivers.length){
    showToast('لا يوجد سائقون لتصديرهم', 'error');
    return;
  }
  const headers = ['الاسم', 'رقم الجوال', 'رقم الهوية', 'رقم رخصة القيادة', 'تاريخ انتهاء الرخصة', 'حالة الرخصة', 'السيارة المرتبطة', 'رقم اللوحة'];
  const rows = state.drivers.map(d=>{
    const v = state.vehicles.find(veh=>veh.driverId===d.id);
    return [
      d.name,
      d.phone || '',
      d.nationalId || '',
      d.licenseNumber || '',
      d.licenseExpiry ? fmtDate(d.licenseExpiry) : 'غير مسجل',
      d.licenseExpiry ? docStatusText(d.licenseExpiry) : 'غير مسجل',
      v ? (v.brand+' '+v.model) : 'بدون سيارة',
      v ? v.plate : '—'
    ];
  });
  const html = buildSheetHtml(headers, rows);
  downloadBlob(html, `تقرير-السائقين-${M.todayStr()}.xls`);
  showToast('تم تصدير تقرير السائقين', 'success');
}

})();

</script>
</body>
</html>
