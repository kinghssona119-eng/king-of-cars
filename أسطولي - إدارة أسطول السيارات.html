<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>أسطولي | إدارة أسطول السيارات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ===========================================================
   أسطولي — نظام إدارة أسطول السيارات
   هوية بصرية: غرفة تحكم / مركز عمليات ليلي
   =========================================================== */

:root{
  --bg-deep: #0B1220;
  --bg-base: #0F1729;
  --surface: #1A2438;
  --surface-2: #212d45;
  --surface-hover: #263252;
  --border: #2A3650;
  --border-light: #344163;

  --text-primary: #E8EDF7;
  --text-secondary: #94A3B8;
  --text-muted: #5E6B85;

  --accent: #F5A623;
  --accent-dim: #b8801c;
  --accent-glow: rgba(245,166,35,0.18);

  --signal-green: #22C55E;
  --signal-green-dim: rgba(34,197,94,0.15);
  --signal-red: #EF4444;
  --signal-red-dim: rgba(239,68,68,0.15);
  --signal-blue: #3B82F6;
  --signal-blue-dim: rgba(59,130,246,0.15);
  --signal-gray: #64748B;

  --radius: 12px;
  --radius-sm: 8px;
  --shadow-lg: 0 20px 50px -10px rgba(0,0,0,0.5);
  --shadow-md: 0 8px 24px -4px rgba(0,0,0,0.4);

  --font-display: 'Cairo', sans-serif;
  --font-body: 'IBM Plex Sans Arabic', sans-serif;
}

*{ box-sizing: border-box; margin:0; padding:0; }
html, body{
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea{ font-family: inherit; }
input, select, textarea{ color-scheme: dark; }
::selection{ background: var(--accent-glow); }

body{
  background-image:
    radial-gradient(circle at 15% 0%, rgba(245,166,35,0.05), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(59,130,246,0.05), transparent 40%);
  background-attachment: fixed;
}

a{ color: var(--accent); text-decoration:none; }

/* ===================== أزرار ===================== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding: 11px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  background: var(--surface-2);
  color: var(--text-primary);
  font-size: 14.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
}
.btn:hover{ background: var(--surface-hover); border-color: var(--accent-dim); }
.btn:active{ transform: scale(0.97); }
.btn-primary{ background: var(--accent); border-color: var(--accent); color: #1a1206; }
.btn-primary:hover{ background: #ffb53d; border-color:#ffb53d; }
.btn-danger{ background: var(--signal-red); border-color: var(--signal-red); color: #fff; }
.btn-danger:hover{ background: #f25555; }
.btn-ghost{ background: transparent; border-color: var(--border); color: var(--text-secondary); }
.btn-ghost:hover{ background: var(--surface); color: var(--text-primary); }
.btn-sm{ padding: 7px 14px; font-size: 13px; }
.btn-icon{ padding: 9px; width:38px; height:38px; }
.btn-block{ width: 100%; }
.btn:disabled{ opacity:.5; cursor:not-allowed; }

/* ===================== شاشة تسجيل الدخول ===================== */
.login-screen{
  min-height: 100vh;
  display:flex; align-items:center; justify-content:center;
  padding: 20px;
  background:
    radial-gradient(circle at 20% 20%, rgba(245,166,35,0.08), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(59,130,246,0.08), transparent 45%),
    var(--bg-deep);
}
.login-card{
  width: 100%; max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 40px 32px;
  box-shadow: var(--shadow-lg);
}
.login-brand{ text-align:center; margin-bottom: 32px; }
.login-logo{ font-size: 42px; display:block; margin-bottom: 8px; filter: drop-shadow(0 4px 12px var(--accent-glow)); }
.login-brand h1{ font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.login-brand p{ color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
.login-form{ display:flex; flex-direction:column; gap: 18px; }
.field label{ display:block; font-size: 13px; color: var(--text-secondary); margin-bottom: 7px; font-weight:600; }
.field input, .field select, .field textarea{
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14.5px;
  transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.field textarea{ resize: vertical; min-height: 70px; }
.login-error{
  background: var(--signal-red-dim); border: 1px solid rgba(239,68,68,0.3);
  color: #fca5a5; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13.5px;
}
.login-hint{ text-align:center; font-size: 12.5px; color: var(--text-muted); margin-top: 18px; }

/* ===================== التخطيط الرئيسي ===================== */
.app{ display:flex; min-height: 100vh; }

.sidebar{
  width: 232px; flex-shrink:0;
  background: var(--bg-deep);
  border-left: 1px solid var(--border);
  display:flex; flex-direction:column;
  position: sticky; top:0; height: 100vh;
  z-index: 50;
}
.sidebar-brand{ display:flex; align-items:center; gap:10px; padding: 22px 20px 18px; }
.sidebar-logo{ font-size: 24px; }
.sidebar-title{ font-family: var(--font-display); font-weight: 800; font-size: 19px; }
.sidebar-nav{ flex:1; display:flex; flex-direction:column; gap:3px; padding: 8px 12px; overflow-y:auto; }
.nav-item{
  display:flex; align-items:center; gap:12px;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  background: transparent; border:none;
  color: var(--text-secondary);
  font-size: 14.5px; font-weight: 600;
  cursor:pointer; text-align: right;
  transition: all .12s;
  position: relative;
}
.nav-item:hover{ background: var(--surface); color: var(--text-primary); }
.nav-item.active{ background: var(--surface-2); color: var(--accent); }
.nav-item.active::before{
  content:''; position:absolute; right:0; top:8px; bottom:8px; width:3px;
  background: var(--accent); border-radius:3px;
}
.nav-icon{ font-size: 17px; width:20px; text-align:center; }
.nav-badge{
  margin-right:auto; background: var(--signal-red); color:#fff;
  font-size: 11px; font-weight:700; min-width:18px; height:18px;
  border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 5px;
}
.sidebar-footer{ padding: 14px 12px; border-top: 1px solid var(--border); }
.btn-logout{
  width:100%; display:flex; align-items:center; gap:10px; justify-content:center;
  padding:10px; background:transparent; border:1px solid var(--border); border-radius:var(--radius-sm);
  color: var(--text-secondary); cursor:pointer; font-size:13.5px; font-weight:600;
}
.btn-logout:hover{ border-color: var(--signal-red); color:#fca5a5; }

.mobile-menu-btn{
  display:none; position:fixed; top:14px; right:14px; z-index:60;
  width:42px; height:42px; border-radius:10px;
  background: var(--surface-2); border:1px solid var(--border-light); color:var(--text-primary);
  font-size:18px; cursor:pointer; box-shadow: var(--shadow-md);
}
.sidebar-overlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:49;
}

.main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  position: sticky; top:0; background: rgba(15,23,41,0.85); backdrop-filter: blur(8px);
  z-index: 30;
}
.topbar h2{ font-family: var(--font-display); font-size: 21px; font-weight: 700; }
.topbar-right{ display:flex; align-items:center; gap:14px; }
.topbar-user{ font-size:14px; color: var(--text-secondary); font-weight:600; }

.view-container{ padding: 24px 28px 60px; max-width: 1400px; }

/* ===================== شبكات وبطاقات عامة ===================== */
.stats-grid{ display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:24px; }
.stat-card{
  background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; position:relative; overflow:hidden;
}
.stat-card .stat-icon{ font-size:20px; opacity:.85; margin-bottom:10px; display:block; }
.stat-card .stat-value{ font-family: var(--font-display); font-size: 28px; font-weight: 800; line-height:1; }
.stat-card .stat-label{ color: var(--text-secondary); font-size: 13px; margin-top:6px; font-weight:600; }
.stat-card.accent-green .stat-value{ color: var(--signal-green); }
.stat-card.accent-red .stat-value{ color: var(--signal-red); }
.stat-card.accent-amber .stat-value{ color: var(--accent); }
.stat-card.accent-blue .stat-value{ color: var(--signal-blue); }

.card{ background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.card-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
.card-header h3{ font-family: var(--font-display); font-size:17px; font-weight:700; }

/* ===================== شريط حالة "غرفة العمليات" — العنصر التوقيعي ===================== */
.status-ticker{
  display:flex; gap:10px; overflow-x:auto; padding: 4px 2px 14px; margin-bottom: 20px;
  scrollbar-width: thin;
}
.status-ticker::-webkit-scrollbar{ height:6px; }
.status-ticker::-webkit-scrollbar-thumb{ background: var(--border-light); border-radius:3px; }
.ticker-pill{
  flex-shrink:0; display:flex; align-items:center; gap:8px;
  background: var(--surface); border:1px solid var(--border);
  border-radius: 999px; padding: 8px 16px 8px 10px;
  font-size: 13px; font-weight:600; white-space:nowrap;
  cursor:pointer; transition: border-color .15s;
}
.ticker-pill:hover{ border-color: var(--border-light); }
.ticker-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ticker-dot.live{ background: var(--signal-green); box-shadow: 0 0 0 0 var(--signal-green); animation: pulse-dot 1.8s infinite; }
.ticker-dot.idle{ background: var(--signal-gray); }
.ticker-dot.alert{ background: var(--signal-red); animation: pulse-dot-red 1.4s infinite; }
@keyframes pulse-dot{
  0%{ box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
  70%{ box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  100%{ box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}
@keyframes pulse-dot-red{
  0%{ box-shadow: 0 0 0 0 rgba(239,68,68,0.55); }
  70%{ box-shadow: 0 0 0 6px rgba(239,68,68,0); }
  100%{ box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}
.ticker-name{ color: var(--text-primary); }
.ticker-sub{ color: var(--text-muted); font-size:11.5px; }

/* ===================== الجداول ===================== */
.table-wrap{ overflow-x:auto; border-radius: var(--radius-sm); border:1px solid var(--border); }
table{ width:100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
thead th{
  text-align: right; padding: 12px 16px; background: var(--surface-2);
  color: var(--text-secondary); font-weight:700; font-size:12.5px;
  border-bottom: 1px solid var(--border); white-space:nowrap;
}
tbody td{ padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align:middle; }
tbody tr:last-child td{ border-bottom:none; }
tbody tr:hover{ background: rgba(255,255,255,0.02); }
.table-empty{ text-align:center; padding: 50px 20px; color: var(--text-muted); }
.table-actions{ display:flex; gap:6px; justify-content:flex-end; }

.badge{
  display:inline-flex; align-items:center; gap:5px;
  padding: 4px 10px; border-radius:999px; font-size:12px; font-weight:700;
}
.badge-green{ background: var(--signal-green-dim); color: var(--signal-green); }
.badge-red{ background: var(--signal-red-dim); color: #fca5a5; }
.badge-amber{ background: var(--accent-glow); color: var(--accent); }
.badge-blue{ background: var(--signal-blue-dim); color: #93c5fd; }
.badge-gray{ background: rgba(100,116,139,0.18); color: var(--text-secondary); }

/* ===================== فورمات / مودالز ===================== */
.modal-overlay{
  position:fixed; inset:0; background: rgba(5,8,16,0.7); backdrop-filter: blur(3px);
  display:flex; align-items:center; justify-content:center; z-index: 200; padding:16px;
}
.modal{
  background: var(--surface); border:1px solid var(--border-light); border-radius: 16px;
  width: 100%; max-width: 560px; max-height: 88vh; display:flex; flex-direction:column;
  box-shadow: var(--shadow-lg);
}
.modal-sm{ max-width: 380px; }
.modal-header{
  display:flex; align-items:center; justify-content:space-between;
  padding: 18px 22px; border-bottom: 1px solid var(--border); flex-shrink:0;
}
.modal-header h3{ font-family: var(--font-display); font-size:18px; font-weight:700; }
.modal-close{
  width:32px; height:32px; border-radius:8px; border:none; background: var(--surface-2);
  color: var(--text-secondary); cursor:pointer; font-size:15px;
}
.modal-close:hover{ background: var(--surface-hover); color:var(--text-primary); }
.modal-body{ padding: 22px; overflow-y:auto; }
.confirm-message{ font-size:15px; line-height:1.6; margin-bottom:20px; color:var(--text-primary); }
.confirm-actions{ display:flex; gap:10px; justify-content:flex-end; }

.form-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
.form-grid .field.full{ grid-column: 1 / -1; }
.field{ margin-bottom: 0; }
.form-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:22px; padding-top:18px; border-top:1px solid var(--border); }
.field-stack{ display:flex; flex-direction:column; gap:16px; }
.field-hint{ font-size:12px; color:var(--text-muted); margin-top:5px; }
.field-row-inline{ display:flex; gap:10px; align-items:flex-end; }
.field-row-inline .field{ flex:1; }

.photo-grid{ display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-top:10px; }
.photo-slot{
  aspect-ratio: 1; border-radius:10px; border:1.5px dashed var(--border-light);
  display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  background: var(--bg-base); cursor:pointer;
}
.photo-slot img{ width:100%; height:100%; object-fit:cover; }
.photo-slot .photo-remove{
  position:absolute; top:4px; left:4px; width:22px; height:22px; border-radius:50%;
  background: rgba(0,0,0,0.6); color:#fff; border:none; font-size:12px; cursor:pointer;
}
.photo-slot-label{ font-size:11px; color:var(--text-muted); text-align:center; padding:4px; }

/* ===================== توست ===================== */
.toast-container{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast{
  background: var(--surface-2); border:1px solid var(--border-light); color:var(--text-primary);
  padding: 12px 20px; border-radius: 10px; font-size:14px; font-weight:600;
  box-shadow: var(--shadow-md); display:flex; align-items:center; gap:10px;
  animation: toast-in .2s ease;
}
.toast.success{ border-color: rgba(34,197,94,0.4); }
.toast.success::before{ content:'✓'; color: var(--signal-green); font-weight:900; }
.toast.error{ border-color: rgba(239,68,68,0.4); }
.toast.error::before{ content:'!'; color: var(--signal-red); font-weight:900; }
@keyframes toast-in{ from{ opacity:0; transform: translateY(10px); } to{ opacity:1; transform:translateY(0); } }

/* ===================== الخريطة ===================== */
#mapView{ height: 560px; border-radius: var(--radius); overflow:hidden; border:1px solid var(--border); }
.leaflet-popup-content-wrapper{ background: var(--surface-2); color: var(--text-primary); border-radius: 10px; }
.leaflet-popup-tip{ background: var(--surface-2); }
.leaflet-popup-content{ font-family: var(--font-body); font-size:13.5px; direction: rtl; }
.map-legend{ display:flex; gap:18px; margin-top:14px; flex-wrap:wrap; }
.map-legend-item{ display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text-secondary); }
.map-legend-dot{ width:11px; height:11px; border-radius:50%; }

/* ===================== شريط بحث/فلترة ===================== */
.toolbar{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
.search-input-wrap{ position:relative; flex:1; min-width:200px; max-width:340px; }
.search-input-wrap input{
  width:100%; padding: 10px 14px 10px 36px;
  background: var(--surface); border:1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-primary); font-size:14px;
}
.search-input-wrap input:focus{ outline:none; border-color: var(--accent); }
.search-input-wrap .search-icon{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; }
.filter-select{
  padding: 10px 14px; background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary); font-size:13.5px; font-weight:600; cursor:pointer;
}

/* ===================== حالة فارغة ===================== */
.empty-state{ text-align:center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .empty-icon{ font-size:38px; display:block; margin-bottom:14px; opacity:.6; }
.empty-state p{ font-size:14.5px; margin-bottom: 18px; }

/* ===================== تبويبات ===================== */
.tabs{ display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.tab-btn{
  padding: 10px 18px; background:transparent; border:none; border-bottom:2px solid transparent;
  color: var(--text-secondary); font-weight:700; font-size:14px; cursor:pointer; margin-bottom:-1px;
}
.tab-btn.active{ color: var(--accent); border-bottom-color: var(--accent); }

/* ===================== تفاصيل سيارة / سائق ===================== */
.detail-header{ display:flex; align-items:center; gap:16px; margin-bottom: 22px; flex-wrap:wrap; }
.detail-avatar{
  width:60px; height:60px; border-radius: 14px; background: var(--surface-2);
  display:flex; align-items:center; justify-content:center; font-size: 26px; flex-shrink:0;
  border:1px solid var(--border-light);
}
.detail-info h2{ font-family: var(--font-display); font-size: 21px; font-weight:800; }
.detail-info p{ color: var(--text-secondary); font-size:13.5px; margin-top:3px; }
.detail-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; margin-bottom:22px; }
.detail-item{ background: var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; }
.detail-item .label{ font-size:12px; color:var(--text-muted); font-weight:600; margin-bottom:5px; }
.detail-item .value{ font-size:15px; font-weight:700; }

/* ===================== الاستجابة (Mobile) ===================== */
@media (max-width: 920px){
  .sidebar{
    position:fixed; right: -260px; top:0; height:100vh; width:240px;
    transition: right .25s ease; box-shadow: var(--shadow-lg);
  }
  .sidebar.open{ right:0; }
  .sidebar-overlay.show{ display:block; }
  .mobile-menu-btn{ display:flex; align-items:center; justify-content:center; }
  .topbar{ padding: 16px 18px 16px 18px; padding-right: 64px; }
  .view-container{ padding: 18px 16px 50px; }
  .stats-grid{ grid-template-columns: repeat(2, 1fr); }
  .form-grid{ grid-template-columns: 1fr; }
  .detail-grid{ grid-template-columns: 1fr 1fr; }
  .photo-grid{ grid-template-columns: repeat(2, 1fr); }
  #mapView{ height: 420px; }
}
@media (max-width: 480px){
  .stats-grid{ grid-template-columns: 1fr 1fr; }
  .login-card{ padding: 30px 22px; }
  .detail-grid{ grid-template-columns: 1fr; }
}

button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible{
  outline: 2px solid var(--accent); outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

</style>
</head>
<body>

<!-- ============ شاشة تسجيل الدخول ============ -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">🚚</div>
      <h1>أسطولي</h1>
      <p>نظام إدارة أسطول السيارات</p>
    </div>
    <form id="loginForm" class="login-form">
      <div class="field">
        <label>اسم المستخدم</label>
        <input type="text" id="loginUser" autocomplete="username" required>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="loginPass" autocomplete="current-password" required>
      </div>
      <div id="loginError" class="login-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-block">دخول</button>
    </form>
    <p class="login-hint" id="firstRunHint" style="display:none">أول استخدام؟ سيتم إنشاء حساب المدير بهذه البيانات تلقائياً.</p>
  </div>
</div>

(function(){
'use strict';

/* ===================== مفاتيح التخزين ===================== */
const LS_KEYS = {
  AUTH: 'aswli_auth',
  VEHICLES: 'aswli_vehicles',
  DRIVERS: 'aswli_drivers',
  DOCUMENTS: 'aswli_documents',
  MAINTENANCE: 'aswli_maintenance',
  ALERTS: 'aswli_alerts',
  SESSION: 'aswli_session',
  SETTINGS: 'aswli_settings'
};

/* ===================== أدوات تخزين أساسية ===================== */
function lsGet(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(raw === null || raw === undefined) return fallback;
    return JSON.parse(raw);
  }catch(e){
    console.error('lsGet error', key, e);
    return fallback;
  }
}
function lsSet(key, value){
  try{
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  }catch(e){
    console.error('lsSet error', key, e);
    showToast('فشل حفظ البيانات — قد تكون مساحة التخزين ممتلئة', 'error');
    return false;
  }
}
function uid(prefix){
  return (prefix||'id') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
}
function nowISO(){ return new Date().toISOString(); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(d){
  if(!d) return '—';
  try{
    const dt = new Date(d);
    if(isNaN(dt.getTime())) return d;
    return dt.toLocaleDateString('en-GB', { year:'numeric', month:'short', day:'numeric', calendar:'gregory' });
  }catch(e){ return d; }
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const target = new Date(dateStr);
  if(isNaN(target.getTime())) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / (1000*60*60*24));
}
function debounce(fn, wait){
  let t;
  return function(...args){
    clearTimeout(t);
    t = setTimeout(()=>fn.apply(this,args), wait);
  };
}

/* ===================== تشفير كلمة المرور (مبسّط للتخزين المحلي) ===================== */
// تنبيه: هذا تطبيق محلي بالكامل (لا يوجد سيرفر)، لذا هذا التجزيء هو حماية أساسية
// لمنع قراءة كلمة المرور كنص صريح من التخزين المحلي، وليس تشفيراً أمنياً معتمداً.
async function hashPassword(pw){
  const enc = new TextEncoder().encode('aswli_salt_v1_' + pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ===================== توست (إشعارات سريعة) ===================== */
function showToast(msg, type){
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(()=>{
    el.style.transition = 'opacity .25s, transform .25s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(8px)';
    setTimeout(()=>el.remove(), 250);
  }, 2600);
}

/* ===================== تأكيد مخصص (بدلاً من confirm) ===================== */
function showConfirm(message, onConfirm){
  const overlay = document.getElementById('confirmOverlay');
  const msgEl = document.getElementById('confirmMessage');
  const okBtn = document.getElementById('confirmOkBtn');
  const cancelBtn = document.getElementById('confirmCancelBtn');
  msgEl.textContent = message;
  overlay.style.display = 'flex';

  function cleanup(){
    overlay.style.display = 'none';
    okBtn.removeEventListener('click', onOk);
    cancelBtn.removeEventListener('click', onCancel);
    overlay.removeEventListener('click', onOverlay);
  }
  function onOk(){ cleanup(); onConfirm(); }
  function onCancel(){ cleanup(); }
  function onOverlay(e){ if(e.target === overlay) cleanup(); }

  okBtn.addEventListener('click', onOk);
  cancelBtn.addEventListener('click', onCancel);
  overlay.addEventListener('click', onOverlay);
}

/* ===================== نظام المودال العام ===================== */
function openModal(title, bodyHtml, opts){
  opts = opts || {};
  document.getElementById('modalTitle').textContent = title;

}
document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

document.addEventListener('keydown', function(e){

/* ===================== State ===================== */
const state = {
  vehicles: [],
  drivers: [],
  documents: [],
  maintenance: [],
  alerts: [],
  currentView: 'dashboard',
  map: null,
  mapMarkers: {},

function loadAllData(){
  state.vehicles = lsGet(LS_KEYS.VEHICLES, []);
  state.drivers = lsGet(LS_KEYS.DRIVERS, []);
  state.documents = lsGet(LS_KEYS.DOCUMENTS, []);
  state.maintenance = lsGet(LS_KEYS.MAINTENANCE, []);
  state.alerts = lsGet(LS_KEYS.ALERTS, []);
}
function saveVehicles(){ lsSet(LS_KEYS.VEHICLES, state.vehicles); }
function saveDrivers(){ lsSet(LS_KEYS.DRIVERS, state.drivers); }
function saveDocuments(){ lsSet(LS_KEYS.DOCUMENTS, state.documents); }
function saveMaintenance(){ lsSet(LS_KEYS.MAINTENANCE, state.maintenance); }
function saveAlerts(){ lsSet(LS_KEYS.ALERTS, state.alerts); }

/* ===================== مدن السعودية للسياج الجغرافي ===================== */
const SAUDI_CITIES = [
  { name:'الرياض', lat:24.7136, lng:46.6753, radius:35 },
  { name:'جدة', lat:21.4858, lng:39.1925, radius:30 },
  { name:'مكة المكرمة', lat:21.3891, lng:39.8579, radius:20 },
  { name:'المدينة المنورة', lat:24.5247, lng:39.5692, radius:20 },
  { name:'الدمام', lat:26.4207, lng:50.0888, radius:25 },
  { name:'الخبر', lat:26.2172, lng:50.1971, radius:15 },
  { name:'الطائف', lat:21.2703, lng:40.4158, radius:20 },
  { name:'بريدة', lat:26.3260, lng:43.9750, radius:18 },
  { name:'تبوك', lat:28.3838, lng:36.5550, radius:18 },
  { name:'خميس مشيط', lat:18.3000, lng:42.7333, radius:15 },
  { name:'أبها', tag:'aseer', lat:18.2164, lng:42.5053, radius:15 },
  { name:'حائل', lat:27.5114, lng:41.7208, radius:15 },
  { name:'نجران', lat:17.4924, lng:44.1277, radius:15 },
  { name:'جازان', lat:16.8894, lng:42.5706, radius:15 },
  { name:'الجبيل', lat:27.0046, lng:49.6604, radius:15 },

];
function findCityByName(name){
  return SAUDI_CITIES.find(c => c.name === name);
}
function distanceKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ===================== المصادقة ===================== */
function getAuth(){ return lsGet(LS_KEYS.AUTH, null); }
function setAuth(auth){ lsSet(LS_KEYS.AUTH, auth); }
function getSession(){ return sessionStorage.getItem(LS_KEYS.SESSION); }
function setSession(username){ sessionStorage.setItem(LS_KEYS.SESSION, username); }
function clearSession(){ sessionStorage.removeItem(LS_KEYS.SESSION); }

async function initAuthScreen(){
  const auth = getAuth();
  const hint = document.getElementById('firstRunHint');
  if(!auth){
    hint.style.display = 'block';
  }
  const session = getSession();
  if(session && auth && session === auth.username){
    showApp();
  }
}

document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errorBox = document.getElementById('loginError');
  errorBox.style.display = 'none';

  if(!username || !password){
    errorBox.textContent = 'الرجاء تعبئة اسم المستخدم وكلمة المرور';
    errorBox.style.display = 'block';
    return;
  }

  let auth = getAuth();
  const hashed = await hashPassword(password);

  if(!auth){
    // أول استخدام: ننشئ حساب المدير
    if(password.length < 4){
      errorBox.textContent = 'كلمة المرور يجب أن تكون 4 أحرف على الأقل';
      errorBox.style.display = 'block';
      return;
    }
    auth = { username, passwordHash: hashed, createdAt: nowISO() };
    setAuth(auth);
    setSession(username);
    showToast('تم إنشاء حساب المدير بنجاح', 'success');
    showApp();
    return;
  }

  if(auth.username === username && auth.passwordHash === hashed){
    setSession(username);
    showApp();
  } else {
    errorBox.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
    errorBox.style.display = 'block';
  }
});

document.getElementById('logoutBtn').addEventListener('click', function(){

function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const auth = getAuth();
  document.getElementById('topbarUser').textContent = auth ? auth.username : 'المدير';
  loadAllData();
  runAlertEngine();
  navigateTo('dashboard');
  setInterval(runAlertEngine, 60000); // فحص التنبيهات كل دقيقة
}

/* تصدير للأقسام الأخرى من الملف */
window.__aswli = {
  LS_KEYS, lsGet, lsSet, uid, nowISO, todayStr, escapeHtml, fmtDate, daysUntil, debounce,
  showToast, showConfirm, openModal, closeModal,
  state, saveVehicles, saveDrivers, saveDocuments, saveMaintenance, saveAlerts,
  SAUDI_CITIES, findCityByName, distanceKm,
  getAuth, setAuth, hashPassword,
  initAuthScreen
};

/* تشغيل شاشة الدخول عند تحميل الصفحة */
document.addEventListener('DOMContentLoaded', initAuthScreen);
if(document.readyState === 'complete' || document.readyState === 'interactive'){
  initAuthScreen();
}

/* ===========================================================
   أسطولي — التنقل ولوحة التحكم
   =========================================================== */
(function(){
'use strict';
const A = window.__aswli;
const { state, escapeHtml, fmtDate, daysUntil, showToast } = A;

/* ===================== التنقل بين الشاشات ===================== */
const VIEW_TITLES = {
  dashboard: 'لوحة التحكم',
  map: 'الخريطة الحية',
  vehicles: 'السيارات',
  drivers: 'السائقون',
  documents: 'الوثائق',
  maintenance: 'الصيانة',
  alerts: 'التنبيهات',
  settings: 'الإعدادات'
};

function navigateTo(view, params){
  state.currentView = view;
  state.currentParams = params || {};
  document.querySelectorAll('.nav-item').forEach(b=>{
    b.classList.toggle('active', b.dataset.view === view);
  });

  closeMobileSidebar();

  const renderers = {
    dashboard: renderDashboard,
    map: renderMapView,
    vehicles: renderVehiclesView,
    drivers: renderDriversView,
    documents: renderDocumentsView,
    maintenance: renderMaintenanceView,
    alerts: renderAlertsView,
    settings: renderSettingsView
  };
  const fn = renderers[view] || renderDashboard;
  fn(params);
}
window.navigateTo = navigateTo;

document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click', ()=> navigateTo(btn.dataset.view));
});

/* ===================== قائمة الموبايل ===================== */
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebarOverlay');
document.getElementById('mobileMenuBtn').addEventListener('click', function(){
  sidebar.classList.add('open');
  overlay.classList.add('show');
});
overlay.addEventListener('click', closeMobileSidebar);
function closeMobileSidebar(){
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

/* ===================== حالة السيارة المحوسبة ===================== */
function getVehicleStatus(v){
  // alert > idle > active بناءً على التنبيهات المرتبطة
  const hasAlert = state.alerts.some(a => a.vehicleId === v.id && !a.resolved);
  if(hasAlert) return 'alert';
  if(v.status === 'inactive') return 'idle';
  return v.lat && v.lng ? 'active' : 'idle';
}
function statusBadge(status){
  const map = {
    active: '<span class="badge badge-green">🟢 نشطة</span>',
    idle: '<span class="badge badge-gray">⏸ متوقفة</span>',
    alert: '<span class="badge badge-red">⚠ تنبيه</span>',
    maintenance: '<span class="badge badge-amber">🔧 بالصيانة</span>'
  };
  return map[status] || map.idle;
}
function getDriverById(id){ return state.drivers.find(d=>d.id===id); }
function getVehicleById(id){ return state.vehicles.find(v=>v.id===id); }
function getVehicleDriver(vehicle){
  if(!vehicle.driverId) return null;
  return getDriverById(vehicle.driverId);
}

/* ===================== محرك التنبيهات ===================== */
function runAlertEngine(){
  const today = new Date();
  let newAlerts = [];

  // 1) تنبيهات الوثائق المنتهية/القريبة من الانتهاء
  state.documents.forEach(doc=>{
    if(!doc.expiryDate) return;
    const d = daysUntil(doc.expiryDate);
    if(d === null) return;
    const alertKey = 'doc_'+doc.id;
    const existing = state.alerts.find(a=>a.key===alertKey && !a.resolved);
    if(d <= 30){
      const severity = d < 0 ? 'red' : (d <= 7 ? 'red' : 'amber');
      const msg = d < 0
        ? `وثيقة "${doc.title}" منتهية منذ ${Math.abs(d)} يوم`
        : `وثيقة "${doc.title}" تنتهي بعد ${d} يوم`;
      if(!existing){
        newAlerts.push(makeAlert('document', doc.vehicleId, alertKey, msg, severity));
      }
    } else if(existing){
      existing.resolved = true;
    }
  });

  // 2) تنبيهات الصيانة (المسافة المتبقية)
  state.vehicles.forEach(v=>{
    if(!v.nextMaintenanceKm || !v.odometer) return;
    const remaining = v.nextMaintenanceKm - v.odometer;
    const alertKey = 'maint_'+v.id;
    const existing = state.alerts.find(a=>a.key===alertKey && !a.resolved);
    if(remaining <= 500){
      const severity = remaining <= 0 ? 'red' : 'amber';
      const msg = remaining <= 0
        ? `السيارة "${v.plate}" تجاوزت موعد الصيانة بـ ${Math.abs(remaining)} كم`
        : `متبقي ${remaining} كم على موعد صيانة السيارة "${v.plate}"`;
      if(!existing){
        newAlerts.push(makeAlert('maintenance', v.id, alertKey, msg, severity));
      }
    } else if(existing){
      existing.resolved = true;
    }
  });

  // 3) تنبيهات خروج عن النطاق الجغرافي (Geofence)
  state.vehicles.forEach(v=>{
    if(!v.lat || !v.lng || !v.assignedCity) return;
    const city = A.findCityByName(v.assignedCity);
    if(!city) return;
    const dist = A.distanceKm(v.lat, v.lng, city.lat, city.lng);
    const alertKey = 'geo_'+v.id;
    const existing = state.alerts.find(a=>a.key===alertKey && !a.resolved);
    if(dist > city.radius){
      const msg = `السيارة "${v.plate}" خرجت عن حدود مدينة ${v.assignedCity} (تبعد ${Math.round(dist)} كم عن المركز)`;
      if(!existing){
        newAlerts.push(makeAlert('geofence', v.id, alertKey, msg, 'red'));
      }
    } else if(existing){
      existing.resolved = true;
    }
  });

  if(newAlerts.length){
    state.alerts = [...newAlerts, ...state.alerts];
  }
  A.saveAlerts();
  updateAlertsBadge();
  if(state.currentView === 'alerts') renderAlertsView();
  if(state.currentView === 'dashboard') renderDashboard();
}
function makeAlert(type, vehicleId, key, message, severity){
  return {
    id: A.uid('alert'), type, vehicleId, key, message, severity,
    resolved:false, createdAt: A.nowISO()
  };
}
function updateAlertsBadge(){
  const count = state.alerts.filter(a=>!a.resolved).length;
  const badge = document.getElementById('alertsBadge');
  if(count > 0){
    badge.style.display = 'flex';
    badge.textContent = count > 99 ? '99+' : count;
  } else {
    badge.style.display = 'none';
  }
}
window.runAlertEngine = runAlertEngine;
window.getVehicleStatus = getVehicleStatus;
window.statusBadge = statusBadge;
window.getDriverById = getDriverById;
window.getVehicleById = getVehicleById;
window.getVehicleDriver = getVehicleDriver;
window.updateAlertsBadge = updateAlertsBadge;

/* ===================== لوحة التحكم ===================== */
function renderDashboard(){
  const container = document.getElementById('viewContainer');
  const totalVehicles = state.vehicles.length;
  const activeCount = state.vehicles.filter(v=>getVehicleStatus(v)==='active').length;
  const alertCount = state.alerts.filter(a=>!a.resolved).length;
  const totalDrivers = state.drivers.length;

  const tickerHtml = state.vehicles.length ? `
    <div class="status-ticker">
      ${state.vehicles.map(v=>{
        const status = getVehicleStatus(v);
        const driver = getVehicleDriver(v);
        return `<div class="ticker-pill" onclick="navigateTo('vehicles',{openId:'${v.id}'})">
          <span class="ticker-dot ${status}"></span>
          <span class="ticker-name">${escapeHtml(v.plate)}</span>
          <span class="ticker-sub">${driver ? escapeHtml(driver.name) : 'بدون سائق'}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  const recentAlerts = state.alerts.filter(a=>!a.resolved).slice(0,5);

  container.innerHTML = `
    ${tickerHtml}
    <div class="stats-grid">
      <div class="stat-card accent-blue">

window.renderVehiclesView = renderVehiclesView;

function filteredVehicles(){
  const term = vehiclesSearchTerm.trim().toLowerCase();
  return state.vehicles.filter(v=>{
    if(vehiclesCityFilter && v.assignedCity !== vehiclesCityFilter) return false;
    if(vehiclesStatusFilter && window.getVehicleStatus(v) !== vehiclesStatusFilter) return false;
    if(!term) return true;
    const driver = window.getVehicleDriver(v);
    const haystack = [
      v.plate, v.model, v.brand, v.color, v.year,
      driver ? driver.name : '', driver ? driver.phone : ''
    ].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(term);
  });

    <div id="mapView"></div>
    <div class="map-legend">
      <div class="map-legend-item"><span class="map-legend-dot" style="background:#22C55E"></span> نشطة</div>
      <div class="map-legend-item"><span class="map-legend-dot" style="background:#EF4444"></span> بتنبيه / خارج النطاق</div>
      <div class="map-legend-item"><span class="map-legend-dot" style="background:#64748B"></span> متوقفة</div>
      <div class="map-legend-item"><span class="map-legend-dot" style="background:#F5A623;opacity:.5;border:1px solid #F5A623"></span> السياج الجغرافي للمدينة</div>
    </div>
  `;

  initOrUpdateMap(withLocation);
}
window.renderMapView = renderMapView;

function initOrUpdateMap(vehicles){
  // تنظيف الخريطة القديمة إن وجدت (لأن innerHTML يهدم الـ DOM الخاص بها)
  if(state.map){
    try{ state.map.remove(); }catch(e){}
    state.map = null;
    state.mapMarkers = {};
    state.geofenceCircles = {};
  }

  const center = vehicles.length ? [vehicles[0].lat, vehicles[0].lng] : [24.7136, 46.6753]; // الرياض كافتراضي
  const map = L.map('mapView', { zoomControl: true }).setView(center, vehicles.length ? 6 : 5);
  state.map = map;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  const usedCities = new Set();
  vehicles.forEach(v=>{
    if(v.assignedCity) usedCities.add(v.assignedCity);
  });
  usedCities.forEach(cityName=>{
    const city = A.findCityByName(cityName);
    if(!city) return;
    L.circle([city.lat, city.lng], {
      radius: city.radius * 1000,
      color: '#F5A623', weight: 1.5, fillColor:'#F5A623', fillOpacity: 0.06, dashArray: '5,6'
    }).addTo(map).bindPopup(`<strong>السياج الجغرافي: ${escapeHtml(cityName)}</strong><br>نطاق ${city.radius} كم`);
  });

  const bounds = [];
  vehicles.forEach(v=>{
    const status = window.getVehicleStatus(v);
    const color = status==='alert' ? '#EF4444' : (status==='active' ? '#22C55E' : '#64748B');
    const driver = window.getVehicleDriver(v);

    const icon = L.divIcon({
      html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2.5px solid #0F1729;box-shadow:0 0 0 2px ${color}55"></div>`,
      className: '', iconSize: [16,16], iconAnchor: [8,8]
    });

    const marker = L.marker([v.lat, v.lng], { icon }).addTo(map);
    marker.bindPopup(`
      <strong>${escapeHtml(v.plate)}</strong><br>
      ${escapeHtml(v.brand||'')} ${escapeHtml(v.model||'')}<br>
      السائق: ${driver?escapeHtml(driver.name):'بدون سائق'}<br>
      ${v.assignedCity ? 'المدينة المخصصة: '+escapeHtml(v.assignedCity) : ''}
    `);
    bounds.push([v.lat, v.lng]);
  });

  if(bounds.length > 1){
    map.fitBounds(bounds, { padding: [40,40] });
  } else if(bounds.length === 1){
    map.setView(bounds[0], 11);
  }

  setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, 150);
}

})();
/* ===========================================================
   أسطولي — الإعدادات
   =========================================================== */
(function(){
'use strict';
const A = window.__aswli;
const { state, showToast, showConfirm, openModal, closeModal, hashPassword } = A;

function renderSettingsView(){
  const container = document.getElementById('viewContainer');
  const auth = A.getAuth();

  container.innerHTML = `
    <div class="card" style="max-width:520px;margin-bottom:20px">
      <div class="card-header"><h3>👤 حساب المدير</h3></div>
      <p style="color:var(--text-secondary);font-size:13.5px;margin-bottom:16px">اسم المستخدم الحالي: <strong style="color:var(--text-primary)">${auth?auth.username:'—'}</strong></p>
      <button class="btn btn-ghost" id="changePasswordBtn">🔒 تغيير كلمة المرور</button>
    </div>

    <div class="card" style="max-width:520px;margin-bottom:20px">
      <div class="card-header"><h3>💾 النسخ الاحتياطي للبيانات</h3></div>
      <p style="color:var(--text-secondary);font-size:13.5px;margin-bottom:16px">
        جميع بيانات التطبيق محفوظة محلياً في هذا المتصفح فقط. يُنصح بتصدير نسخة احتياطية دورياً.
      </p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" id="exportDataBtn">⬇️ تصدير نسخة احتياطية (JSON)</button>
        <button class="btn btn-ghost" id="importDataBtn">⬆️ استيراد نسخة احتياطية</button>
      </div>
      <input type="file" id="importFileInput" accept=".json" style="display:none">
    </div>

    <div class="card" style="max-width:520px;border-color:rgba(239,68,68,0.35)">
      <div class="card-header"><h3 style="color:#fca5a5">⚠️ منطقة الخطر</h3></div>
      <p style="color:var(--text-secondary);font-size:13.5px;margin-bottom:16px">
        حذف جميع البيانات (السيارات، السائقين، الوثائق، الصيانة، التنبيهات) بشكل نهائي. لا يمكن التراجع عن هذا الإجراء.
      </p>
      <button class="btn btn-danger" id="wipeDataBtn">حذف جميع البيانات</button>
    </div>
  `;

  document.getElementById('changePasswordBtn').addEventListener('click', openChangePasswordModal);
  document.getElementById('exportDataBtn').addEventListener('click', exportBackup);
  document.getElementById('importDataBtn').addEventListener('click', ()=>document.getElementById('importFileInput').click());
  document.getElementById('importFileInput').addEventListener('change', importBackup);
  document.getElementById('wipeDataBtn').addEventListener('click', wipeAllData);
}
window.renderSettingsView = renderSettingsView;

function openChangePasswordModal(){
  const body = `
    <form id="pwForm" class="field-stack">
      <div class="field"><label>كلمة المرور الحالية</label><input type="password" id="oldPw" required></div>
      <div class="field"><label>كلمة المرور الجديدة</label><input type="password" id="newPw" required minlength="4"></div>
      <div class="field"><label>تأكيد كلمة المرور الجديدة</label><input type="password" id="newPw2" required minlength="4"></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="pwCancelBtn">إلغاء</button>
        <button type="submit" class="btn btn-primary">تحديث كلمة المرور</button>
      </div>
    </form>
  `;
  openModal('تغيير كلمة المرور', body);
  document.getElementById('pwCancelBtn').addEventListener('click', closeModal);
  document.getElementById('pwForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const oldPw = document.getElementById('oldPw').value;
    const newPw = document.getElementById('newPw').value;
    const newPw2 = document.getElementById('newPw2').value;
    const auth = A.getAuth();
    const oldHash = await hashPassword(oldPw);
    if(oldHash !== auth.passwordHash){
      showToast('كلمة المرور الحالية غير صحيحة', 'error');
      return;
    }
    if(newPw !== newPw2){
      showToast('كلمتا المرور الجديدتان غير متطابقتين', 'error');
      return;
    }
    auth.passwordHash = await hashPassword(newPw);
    A.setAuth(auth);
    showToast('تم تغيير كلمة المرور بنجاح', 'success');
    closeModal();
  });
}

function exportBackup(){
  const backup = {
    exportedAt: new Date().toISOString(),
    app: 'aswli-fleet-management',
    version: 1,
    vehicles: state.vehicles,
    drivers: state.drivers,
    documents: state.documents,
    maintenance: state.maintenance,
    alerts: state.alerts
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `aswli-backup-${A.todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('تم تصدير النسخة الاحتياطية', 'success');
}

function importBackup(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = JSON.parse(ev.target.result);
      if(!data || data.app !== 'aswli-fleet-management'){
        showToast('ملف غير صالح لهذا التطبيق', 'error');
        return;
      }
      showConfirm('سيتم استبدال جميع البيانات الحالية بالبيانات من الملف المستورد. هل تريد الاستمرار؟', function(){
        state.vehicles = data.vehicles || [];
        state.drivers = data.drivers || [];
        state.documents = data.documents || [];
        state.maintenance = data.maintenance || [];
        state.alerts = data.alerts || [];
        A.saveVehicles(); A.saveDrivers(); A.saveDocuments(); A.saveMaintenance(); A.saveAlerts();
        showToast('تم استيراد البيانات بنجاح', 'success');
        window.runAlertEngine();
        navigateTo('dashboard');
      });
    }catch(err){
      showToast('تعذرت قراءة الملف، تأكد أنه ملف نسخة احتياطية صالح', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function wipeAllData(){
  showConfirm('هل أنت متأكد تماماً؟ سيتم حذف جميع السيارات والسائقين والوثائق وسجلات الصيانة والتنبيهات بشكل نهائي ولا يمكن التراجع عن هذا الإجراء.', function(){
    state.vehicles = []; state.drivers = []; state.documents = []; state.maintenance = []; state.alerts = [];
    A.saveVehicles(); A.saveDrivers(); A.saveDocuments(); A.saveMaintenance(); A.saveAlerts();
    showToast('تم حذف جميع البيانات', 'success');
    const badge = document.getElementById('alertsBadge');
    badge.style.display = 'none';
    navigateTo('dashboard');
  });
}

})();

</script>
</body>
